<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feltbane-editor – Birkebeineren</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    .leaflet-crosshair, .leaflet-crosshair .leaflet-interactive { cursor: crosshair !important; }

    /* Editor control panel */
    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      width: 240px; background: #fff; border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.3); padding: 12px; font-size: 13px;
    }
    #panel h1 { font-size: 15px; margin: 0 0 8px; }
    #panel button { width: 100%; padding: 8px; margin: 3px 0; border: 0;
      border-radius: 7px; font-size: 13px; cursor: pointer; }
    .btn-primary { background: #0b2e7a; color: #fff; }
    .btn-primary.active { background: #c0392b; }
    .btn-light { background: #eef1f6; }
    .btn-danger { background: #fff0f0; color: #c0392b; }
    #hint { font-size: 12px; color: #555; min-height: 32px; margin: 6px 0;
      background: #f7f9fc; border-radius: 6px; padding: 6px; }
    #count { font-weight: 700; }
    label.chk { display: flex; align-items: center; gap: 6px; margin-top: 8px;
      font-size: 12px; color: #333; }
    .row { display: flex; gap: 6px; } .row button { margin: 3px 0; }

    /* Station rendering */
    .bue-label { font: 700 12px/1 system-ui, sans-serif; color: #fff;
      background: #0b2e7a; border-radius: 9px; padding: 2px 7px; white-space: nowrap;
      box-shadow: 0 1px 3px rgba(0,0,0,.5); }
    .bue-label span { font-weight: 400; font-size: 11px; opacity: .9; }
    .peg-icon { width: 12px; height: 12px; border: 3px solid #0b2e7a;
      background: #fff; border-radius: 50%; box-sizing: border-box; }
    .tgt-icon { width: 16px; height: 16px; border: 3px solid #c0392b;
      background: #fff; border-radius: 50%; box-sizing: border-box; box-shadow: 0 0 0 2px #fff; }
    .edit-form label { display:block; margin:4px 0 2px; font-size:12px; }
    .edit-form input { width: 100%; box-sizing: border-box; padding: 4px; }
    .edit-form .save { background:#0b2e7a;color:#fff;border:0;border-radius:6px;padding:6px;margin-top:8px;width:100%;cursor:pointer;}
    .edit-form .del { background:none;border:0;color:#c0392b;cursor:pointer;margin-top:6px;width:100%;}
    .locate-btn { font-size:16px; text-align:center; line-height:26px; text-decoration:none; cursor:pointer; }
    .locate-btn.active { background:#d6e4ff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>🎯 Feltbane-editor</h1>
    <button id="addBtn" class="btn-primary">➕ Ny stasjon</button>
    <div id="hint">Klikk «Ny stasjon», klikk så <b>skytepunkt</b> og deretter <b>blink</b> i kartet. Avstanden regnes ut automatisk.</div>
    <div>Stasjoner: <span id="count">0</span></div>
    <div class="row">
      <button id="exportBtn" class="btn-light">💾 Eksporter</button>
      <button id="importBtn" class="btn-light">📂 Importer</button>
    </div>
    <button id="clearBtn" class="btn-danger">🗑 Tøm alt</button>
    <input id="fileInput" type="file" accept=".geojson,application/json" hidden />
    <label class="chk"><input type="checkbox" id="dgRef" /> Vis discgolfbane (referanse)</label>
    <label class="chk"><input type="checkbox" id="autosaveInfo" checked disabled /> Lagres automatisk (localStorage)</label>
    <a href="./index.html" style="display:block;margin-top:8px;font-size:12px;">← Tilbake til kartvisning</a>
  </div>
  <script src="./editor.js"></script>
</body>
</html>
