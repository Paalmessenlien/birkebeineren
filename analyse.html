<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sikkerhetsanalyse (SWOT) – Birkebeineren feltbane</title>
  <style>
    :root { --red:#c0392b; --amber:#e67e22; --green:#1f9d55; --ink:#1c2330; --line:#e6e9ef; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { font: 15px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink); background: #f4f6fa; }
    header { background: linear-gradient(135deg,#0b2e7a,#1456b8); color: #fff;
      padding: 26px 20px; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 18px; }
    header h1 { margin: 0 0 4px; font-size: 24px; }
    header p { margin: 0; opacity: .9; font-size: 14px; }
    header a { color: #cfe0ff; }
    h2 { font-size: 18px; margin: 26px 0 10px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
      gap: 12px; }
    .kpi { background: #fff; border: 1px solid var(--line); border-radius: 12px;
      padding: 14px; }
    .kpi .n { font-size: 26px; font-weight: 800; }
    .kpi .l { font-size: 12px; color: #5b6675; }
    .swot { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .swot > div { background: #fff; border: 1px solid var(--line); border-radius: 12px;
      padding: 14px 16px; }
    .swot h3 { margin: 0 0 6px; font-size: 14px; }
    .swot ul { margin: 0; padding-left: 18px; } .swot li { margin: 3px 0; }
    .s-str { border-top: 4px solid var(--green); }
    .s-wek { border-top: 4px solid var(--red); }
    .s-opp { border-top: 4px solid #2d7dd2; }
    .s-thr { border-top: 4px solid var(--amber); }
    .profile { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; }
    .tcards { display: grid; grid-template-columns: repeat(auto-fill,minmax(330px,1fr));
      gap: 14px; }
    .t { background: #fff; border: 1px solid var(--line); border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column; }
    .t .top { padding: 12px 14px; color: #fff; display: flex; align-items: baseline;
      justify-content: space-between; gap: 8px; }
    .lvl-Høy .top { background: var(--red); }
    .lvl-Middels .top { background: var(--amber); }
    .lvl-Lav .top { background: var(--green); }
    .t .top b { font-size: 17px; } .t .top .lvl { font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 20px; }
    .t .body { padding: 12px 14px; }
    .facts { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
      font-size: 13px; margin-bottom: 10px; }
    .facts dt { color: #5b6675; } .facts dd { margin: 0; font-weight: 600; }
    .t h4 { margin: 10px 0 4px; font-size: 12px; text-transform: uppercase;
      letter-spacing: .03em; color: #5b6675; }
    .t ul { margin: 0; padding-left: 18px; font-size: 13.5px; }
    .t li { margin: 2px 0; }
    .pill { display:inline-block; font-size:11px; font-weight:700; padding:1px 7px;
      border-radius:20px; }
    .pill.ok { background:#e3f6ec; color:#127a40; }
    .pill.warn { background:#fdf0dd; color:#9a5b09; }
    .pill.bad { background:#fbe6e2; color:#a3271a; }
    footer { color:#5b6675; font-size:12px; padding:24px 0 40px; }
    .note { background:#fff; border:1px solid var(--line); border-left:4px solid #2d7dd2;
      border-radius:10px; padding:12px 14px; font-size:13.5px; }
    @media (max-width:640px){ .swot{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header><div class="wrap">
    <h1>🎯 Sikkerhetsanalyse – Birkebeineren feltbane</h1>
    <p>SWOT + mål-for-mål vurdering · World Archery-soner, Kartverket høydedata og konflikt mot discgolfbanen ·
       <a href="./index.html">← tilbake til kartet</a></p>
  </div></header>

  <main class="wrap">
    <h2>Nøkkeltall</h2>
    <div class="cards" id="kpis"></div>

    <h2>Høydeprofil langs gangruta (blinkhøyde)</h2>
    <div class="profile"><svg id="profile" width="100%" height="170" preserveAspectRatio="none"></svg>
      <div id="profileLabels" style="display:flex;justify-content:space-between;font-size:11px;color:#5b6675;margin-top:4px;"></div></div>

    <h2>SWOT – delt areal bueskyting + discgolf</h2>
    <div class="swot" id="swot"></div>

    <h2>Mål-for-mål</h2>
    <div class="tcards" id="targets"></div>

    <h2>Metode</h2>
    <div class="note" id="method"></div>
  </main>
  <footer class="wrap" id="foot"></footer>

  <script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  // ---- geometry (metre-scale, same as app.js) ----
  function bearing(aLat,aLng,bLat,bLng){ const r=Math.PI/180,
    y=Math.sin((bLng-aLng)*r)*Math.cos(bLat*r),
    x=Math.cos(aLat*r)*Math.sin(bLat*r)-Math.sin(aLat*r)*Math.cos(bLat*r)*Math.cos((bLng-aLng)*r);
    return (Math.atan2(y,x)*180/Math.PI+360)%360; }
  function dest(lat,lng,b,d){ const br=b*Math.PI/180;
    return [lat+(d*Math.cos(br))/111320, lng+(d*Math.sin(br))/(111320*Math.cos(lat*Math.PI/180))]; }
  function distM(aLat,aLng,bLat,bLng){ const dLat=(bLat-aLat)*111320,
    dLng=(bLng-aLng)*111320*Math.cos(((aLat+bLat)/2)*Math.PI/180); return Math.hypot(dLat,dLng); }
  function pip(pt,ring){ let inside=false; for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const yi=ring[i][0],xi=ring[i][1],yj=ring[j][0],xj=ring[j][1];
    if(((yi>pt.lat)!==(yj>pt.lat)) && (pt.lng<((xj-xi)*(pt.lat-yi))/(yj-yi)+xi)) inside=!inside; }
    return inside; }
  const COMPASS=['N','NØ','Ø','SØ','S','SV','V','NV'];
  function compass(b){ return COMPASS[Math.round(b/45)%8]; }
  function angDiff(a,b){ const d=Math.abs(a-b)%360; return d>180?360-d:d; }
  function dirCat(diff){ return diff<=45?'samme':diff<=90?'kryssende':'motgående'; }

  Promise.all([
    fetch('./course.geojson').then(r=>r.json()),
    fetch('./birkebeineren-feltbane.geojson').then(r=>r.json())
  ]).then(([course, felt])=>{
    // disc golf reference points (densified, tagged with hole + kind) + per-hole throw bearing
    const dg=[], holeB={};
    course.features.forEach(f=>{ const p=f.properties;
      if(p.kind==='tee'||p.kind==='basket') dg.push({lat:f.geometry.coordinates[1],lng:f.geometry.coordinates[0],hole:p.hole,kind:p.kind});
      else if(p.kind==='fairway'){ const cs=f.geometry.coordinates;
        const tb=bearing(cs[0][1],cs[0][0],cs[cs.length-1][1],cs[cs.length-1][0]);
        const tl=distM(cs[0][1],cs[0][0],cs[cs.length-1][1],cs[cs.length-1][0]);
        if(!holeB[p.hole]||tl>holeB[p.hole].len) holeB[p.hole]={brg:tb,len:tl};
        for(let i=0;i<cs.length-1;i++){ const a=cs[i],b=cs[i+1], seg=distM(a[1],a[0],b[1],b[0]), n=Math.max(1,Math.ceil(seg/5));
          for(let s=0;s<=n;s++){ const t=s/n; dg.push({lat:a[1]+(b[1]-a[1])*t,lng:a[0]+(b[0]-a[0])*t,hole:p.hole,kind:'fairway'}); } } }
    });

    const FUNNEL_MIN=5;
    const stations = felt.features
      .filter(f=>f.geometry.type==='LineString' && f.properties.kind!=='route' && f.properties.kind!=='safety')
      .sort((a,b)=>(+a.properties.station)-(+b.properties.station))
      .map(f=>{
        const cs=f.geometry.coordinates, p=f.properties;
        const sLat=cs[0][1],sLng=cs[0][0], tLat=cs[cs.length-1][1],tLng=cs[cs.length-1][0];
        const dist=Number(p.distance)||0, brg=bearing(sLat,sLng,tLat,tLng);
        const overshoot=Number(p.overshoot_m)||50, R=dist+overshoot, farHalf=Math.max(FUNNEL_MIN,R/6);
        const fC=dest(sLat,sLng,brg,R);
        const ring=[dest(sLat,sLng,brg-90,FUNNEL_MIN),dest(fC[0],fC[1],brg-90,farHalf),
                    dest(fC[0],fC[1],brg+90,farHalf),dest(sLat,sLng,brg+90,FUNNEL_MIN)];
        const hitHoles={}, hitKinds={};
        dg.forEach(q=>{ if(pip(q,ring)){ hitHoles[q.hole]=true; hitKinds[q.kind]=true; } });
        const holes=Object.keys(hitHoles).sort((a,b)=>a-b);
        const kinds=Object.keys(hitKinds);
        const slope=p.slope_deg, backstop=p.backstop_m;
        // Direction of the shot vs each overlapping hole's throw. Same-direction
        // overlaps are managed by overview + turn-taking and are NOT conflicts;
        // only opposing throws are genuine conflicts.
        const order={samme:0,kryssende:1,'motgående':2};
        let worst=null; const byCat={samme:[],kryssende:[],'motgående':[]};
        holes.forEach(h=>{ const hb=holeB[h]; if(!hb) return;
          const cat=dirCat(angDiff(brg,hb.brg)); byCat[cat].push(h);
          if(worst===null||order[cat]>order[worst]) worst=cat; });
        const opposing=worst==='motgående', crossing=worst==='kryssende';
        const carryRisk = !backstop && ((slope!=null&&slope<=-8) || dist>=60); // langt utløp
        const level = (opposing&&!backstop) ? 'Høy'
          : (opposing||crossing||carryRisk) ? 'Middels' : 'Lav';
        return {st:p.station,dgHole:p.dg_hole,dist,brg,slope,zp:p.z_peg,zt:p.z_target,
          backstop,overshoot,note:p.terrain_note,holes,kinds,byCat,worst,opposing,crossing,
          carryRisk,level,halfW:dist/6};
      });

    // ---------- KPIs ----------
    const nOpp=stations.filter(s=>s.opposing).length;
    const nSame=stations.filter(s=>s.worst==='samme').length;
    const nBack=stations.filter(s=>s.backstop).length;
    const nAtt=stations.filter(s=>s.opposing||s.crossing||s.carryRisk).length;
    const nHigh=stations.filter(s=>s.level==='Høy').length;
    const zs=stations.map(s=>s.zt).filter(z=>z!=null);
    const zRange=zs.length?(Math.round(Math.max(...zs)-Math.min(...zs)))+' m':'–';
    const kpi=[['Stasjoner',stations.length,''],
      ['Motgående konflikt',nOpp,'discgolf-retning mot skudd'],
      ['Samme-retning overlapp',nSame,'håndteres m/ oversikt + venting'],
      ['Naturlig bakstopp',nBack,'terreng stiger bak'],
      ['Krever oversikt',nAtt,'kryssende / langt utløp'],
      ['Høy risiko',nHigh,'krever tiltak'],
      ['Høydespenn blink',zRange,'min→maks moh']];
    document.getElementById('kpis').innerHTML = kpi.map(k=>
      `<div class="kpi"><div class="n">${esc(k[1])}</div><div class="l">${esc(k[0])}${k[2]?'<br>'+esc(k[2]):''}</div></div>`).join('');

    // ---------- elevation profile ----------
    (function(){
      const W=1000,H=170,pad=24, pts=stations.map(s=>s.zt);
      const mn=Math.min(...pts), mx=Math.max(...pts), span=(mx-mn)||1;
      const x=i=>pad+i*(W-2*pad)/(pts.length-1);
      const y=z=>H-pad-(z-mn)/span*(H-2*pad);
      const line=pts.map((z,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(z).toFixed(1)).join(' ');
      const area=line+` L ${x(pts.length-1).toFixed(1)} ${H-pad} L ${x(0).toFixed(1)} ${H-pad} Z`;
      const dots=stations.map((s,i)=>{ const c=s.level==='Høy'?'#c0392b':s.level==='Middels'?'#e67e22':'#1f9d55';
        return `<circle cx="${x(i).toFixed(1)}" cy="${y(s.zt).toFixed(1)}" r="5" fill="${c}" stroke="#fff" stroke-width="1.5"><title>St ${esc(s.st)} – ${esc(s.zt)} moh</title></circle>`+
               `<text x="${x(i).toFixed(1)}" y="${(y(s.zt)-9).toFixed(1)}" font-size="10" text-anchor="middle" fill="#1c2330">${esc(s.st)}</text>`; }).join('');
      document.getElementById('profile').setAttribute('viewBox',`0 0 ${W} ${H}`);
      document.getElementById('profile').innerHTML =
        `<path d="${area}" fill="rgba(20,86,184,.10)"/><path d="${line}" fill="none" stroke="#1456b8" stroke-width="2"/>${dots}`;
      document.getElementById('profileLabels').innerHTML =
        `<span>lav: ${mn.toFixed(0)} moh</span><span>høy: ${mx.toFixed(0)} moh</span>`;
    })();

    // ---------- SWOT ----------
    const sameList=stations.filter(s=>s.worst==='samme').map(s=>'st'+s.st+'→hull '+s.byCat.samme.join('/')).join(', ');
    const oppList=stations.filter(s=>s.opposing).map(s=>'st'+s.st+'→hull '+s.byCat['motgående'].join('/')).join(', ');
    const carryList=stations.filter(s=>s.carryRisk).map(s=>'st'+s.st+' ('+s.dist.toFixed(0)+' m'+(s.slope!=null?', '+Math.round(s.slope)+'°':'')+')').join(', ');
    const swot=[
      ['s-str','💪 Styrker',[
        '<b>Alle overlapp er samme kasteretning</b> som discgolf'+(sameList?' ('+esc(sameList)+')':'')+' – bue og disc sender begge «nedover» samme vei, ingen skyter mot der den andre står.',
        'Bueskyttere og discgolfere er vant til å <b>vente på tur</b> og ha <b>oversikt over feltet før skudd/kast</b> – grunnpremisset for sambruk er oppfylt i åpent, oversiktlig terreng.',
        nBack+' av '+stations.length+' stasjoner har <b>naturlig bakstopp</b> (terrenget stiger ≥3 m bak blink) som fanger overskyting.',
        'Hele banen ligger innenfor eiendom 51/1 og 57/5; ingen skyting over/mot veg. Soner følger WA overshoot-trakt (avstand/6).']],
      ['s-wek','⚠️ Svakheter',[
        (nOpp?('<b>'+nOpp+' stasjoner</b> har motgående discgolf-retning i sonen: '+esc(oppList)+'.'):'<b>Ingen</b> stasjoner skyter mot discgolf-kastretningen.'),
        'Langt/bratt utløp der pil kan bære forbi blink: '+(carryList?esc(carryList):'ingen')+' – krever god oversikt bakover.',
        'Sambruk hviler på etikette: at man faktisk venter på tur og sjekker feltet – ikke på fysisk skille.']],
      ['s-opp','🚀 Muligheter',[
        'Tydelig <b>standplass-/venteregel</b>: skyt/kast bare når den parallelle korridoren foran er klar (slik begge sportene allerede praktiserer).',
        'Behold sambruk i oversiktlig terreng; vurder skilt/markering ved de få stasjonene med langt utløp.',
        'Bruk terrenget aktivt – legg blink foran stigninger som naturlig bakstopp.',
        'Sett opp varsel/nett bak de bratte nedoverbakkeskuddene (st12, st14) for ekstra margin.']],
      ['s-thr','🌩️ Trusler',[
        'Uoversiktlige forhold (tett vegetasjon, dårlig sikt, mørke) bryter premisset om oversikt før skudd.',
        'Lange nedoverbakkeskudd (st7, st12, st14) der pil kan bære langt ved feilskudd.',
        'Feilskudd mot hytter i vest / veg i sør ved enkelte standplasser.',
        'Tapte piler i terreng med allmenn ferdsel.']]
    ];
    document.getElementById('swot').innerHTML = swot.map(b=>
      `<div class="${b[0]}"><h3>${b[1]}</h3><ul>${b[2].map(li=>'<li>'+li+'</li>').join('')}</ul></div>`).join('');

    // ---------- per-target cards ----------
    document.getElementById('targets').innerHTML = stations.map(s=>{
      const dir=compass(s.brg), updown = s.slope==null?'':(s.slope>1?'oppover':s.slope<-1?'nedover':'flatt');
      const problems=[], measures=[], strengths=[];
      const sameH=s.byCat.samme, crossH=s.byCat.kryssende, oppH=s.byCat['motgående'];
      if(oppH.length){ problems.push('<b>Motgående:</b> sonen dekker discgolf hull '+esc(oppH.join(', '))+' som kaster mot skuddretningen.');
        measures.push('Vent til hull '+esc(oppH.join(', '))+' er klart; vurder å flytte/snu standplass.'); }
      if(crossH.length){ problems.push('<b>Kryssende:</b> sonen dekker discgolf hull '+esc(crossH.join(', '))+' (retning på tvers).');
        measures.push('Visuell sjekk og venting før skudd mot hull '+esc(crossH.join(', '))+'.'); }
      if(sameH.length){ strengths.push('Overlapper discgolf hull '+esc(sameH.join(', '))+', men <b>samme kasteretning</b> – ingen skyter mot der den andre står.');
        measures.push('Vanlig standplass-etikette: skyt når korridoren foran er klar.'); }
      if(s.carryRisk){ problems.push('Langt/bratt utløp ('+s.dist.toFixed(0)+' m'+(s.slope!=null?', '+Math.round(s.slope)+'°':'')+', '+Math.round(s.overshoot)+' m overskyting) – pil kan bære forbi blink.');
        measures.push('Hold utløpet fritt for ferdsel; vurder varsel/nett bak blink.'); }
      if(!oppH.length && !crossH.length && !s.carryRisk) problems.push('Ingen vesentlige problemer – samme retning / fri sone, håndteres med vanlig oversikt og venting.');
      if(s.backstop){ strengths.push('Naturlig bakstopp ~'+s.backstop+' m bak blink (terreng stiger) demper overskyting.'); measures.push('Behold blinkplassering foran stigningen – terrenget er sikringen.'); }
      if(s.slope!=null && s.slope>1) strengths.push('Skyter oppover ('+Math.round(s.slope)+'°) – kort pilutløp bak blink.');
      const dirPill = !s.worst ? '<span class="pill ok">ingen overlapp</span>'
        : s.worst==='samme' ? '<span class="pill ok">samme retning · hull '+esc(sameH.join(', '))+'</span>'
        : s.worst==='kryssende' ? '<span class="pill warn">kryssende · hull '+esc(crossH.join(', '))+'</span>'
        : '<span class="pill bad">motgående · hull '+esc(oppH.join(', '))+'</span>';
      const facts=[['Discgolf-hull', s.dgHole!=null?('hull '+s.dgHole):'–'],
        ['Avstand', s.dist.toFixed(1)+' m'],
        ['Retning', dir+' ('+Math.round(s.brg)+'°)'],
        ['Høyde pel→blink', (s.zp!=null?s.zp:'?')+' → '+(s.zt!=null?s.zt:'?')+' moh'],
        ['Helling', (s.slope!=null?(s.slope>0?'+':'')+s.slope+'° '+updown:'–')],
        ['Bakstopp', s.backstop?('~'+s.backstop+' m'):'nei'],
        ['Overskyting', Math.round(s.overshoot)+' m'],
        ['Discgolf i sone', dirPill]];
      return `<div class="t lvl-${s.level}">
        <div class="top"><b>Stasjon ${esc(s.st)}</b><span class="lvl">${s.level} risiko</span></div>
        <div class="body">
          <dl class="facts">${facts.map(f=>'<dt>'+esc(f[0])+'</dt><dd>'+f[1]+'</dd>').join('')}</dl>
          <p style="margin:4px 0 0;font-size:13.5px">Skyter ${dir} (${Math.round(s.brg)}°), ${s.dist.toFixed(0)} m ${updown}${s.slope!=null?' '+Math.abs(Math.round(s.slope))+'°':''}. ${esc(s.note||'')}.</p>
          ${strengths.length?'<h4>Styrker</h4><ul>'+strengths.map(x=>'<li>'+x+'</li>').join('')+'</ul>':''}
          <h4>Mulige problemer</h4><ul>${problems.map(x=>'<li>'+x+'</li>').join('')}</ul>
          ${measures.length?'<h4>Tiltak</h4><ul>'+measures.map(x=>'<li>'+x+'</li>').join('')+'</ul>':''}
        </div></div>`;
    }).join('');

    document.getElementById('method').innerHTML =
      'Sikkerhetssonene følger <b>World Archery</b> sin overshoot-trakt: trygg halvbredde = avstand ÷ 6 (min 5 m) ut fra skytepelen, '+
      'med overskyting bak blink justert etter <b>Kartverkets høydedata (1 m DTM)</b> – kortet ned der terrenget stiger til naturlig bakstopp (≥3 m innen 50 m), '+
      'forlenget på nedoverbakkeskudd. <b>Overlapp er ikke det samme som konflikt:</b> for hvert discgolf-element i sonen sammenlignes skuddretningen med hullets '+
      'kasteretning (lengste fairway). Skyter de <b>samme vei</b> (≤45°) er det trygt med vanlig oversikt og venting på tur – som begge sportene allerede praktiserer; '+
      'bare <b>motgående</b> retning (&gt;90°) regnes som reell konflikt, og <b>kryssende</b> (45–90°) eller langt/bratt utløp markeres som «krever oversikt». '+
      'Premisset er åpent, oversiktlig terreng. Tallene regnes live fra geojson-filene, så siden følger redigeringer av banen.';
    document.getElementById('foot').textContent =
      'Generert fra birkebeineren-feltbane.geojson + course.geojson · WA-regelverk + Kartverket høydedata · '+stations.length+' stasjoner analysert.';
  }).catch(e=>{ document.querySelector('main').innerHTML='<p style="color:#c0392b">Kunne ikke laste data: '+esc(e.message)+'</p>'; });
  </script>
</body>
</html>
